[buildPlans.Markmono]
family = "Markmono"
spacing = "normal"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

[buildPlans.Markmono.variants.design]
two = "straight-neck-serifless"
three = "flat-top-serifless"
five = "oblique-arched-serifless"
capital-g = "toothless-rounded-serifless-hooked"
capital-j = "flat-hook-serifed"
capital-q = "crossing"
capital-w = "straight-flat-top-serifless"
f = "flat-hook-serifless-crossbar-at-x-height"
i = "hooky"
j = "flat-hook-serifed"
k = "symmetric-connected-serifless"
t = "flat-hook-short-neck"
w = "straight-flat-top-serifless"
punctuation-dot = "square"
asterisk = "penta-mid"
brace = "curly-flat-boundary"
number-sign = "slanted"
ampersand = "upper-open"
question = "corner-flat-hooked"

[buildPlans.Markmono.variants.italic]
e = "flat-crossbar"
f = "flat-hook-extended-crossbar-at-x-height"
i = "serifed-flat-tailed"
k = "symmetric-connected-serifless"
l = "serifed-flat-tailed"
y = "straight-serifless"

[buildPlans.Markmono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Markmono.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Markmono.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.Markmono.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.Markmono.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.Markmono.weights.ExtraBold]
shape = 800
menu = 800
css = 800

[buildPlans.Markmono.weights.Heavy]
shape = 900
menu = 900
css = 900

[buildPlans.Markmono.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.Markmono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Markmono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
